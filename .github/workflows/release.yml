name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            workdir: apps/electron
          - os: windows-latest
            platform: win
            workdir: apps/electron
          - os: ubuntu-latest
            platform: linux
            workdir: apps/electron-linux
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          rm -f .npmrc
          bun install

      - name: Setup Linux symlinks
        if: runner.os == 'Linux'
        working-directory: apps/electron-linux
        run: |
          chmod +x setup-symlinks.sh
          ./setup-symlinks.sh

      - name: Build
        working-directory: ${{ matrix.workdir }}
        run: bun run build

      - name: Package (electron-builder)
        working-directory: ${{ matrix.workdir }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --${{ matrix.platform }}

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: |
            apps/electron/out/*.dmg
            apps/electron/out/*.zip
          retention-days: 90

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            apps/electron/out/*.exe
          retention-days: 90

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            apps/electron-linux/out/*.AppImage
            apps/electron-linux/out/*.deb
            apps/electron-linux/out/*.tar.gz
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: [build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -laR artifacts/ || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/**
