name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-desktop:
    name: Build Desktop (electron-builder)
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Linux symlinks
        if: runner.os == 'Linux'
        run: |
          cd apps/electron-linux
          chmod +x setup-symlinks.sh
          ./setup-symlinks.sh

      - name: Build desktop
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            cd apps/electron-linux
          else
            cd apps/electron
          fi
          bun run build

      - name: Package (electron-builder)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            cd apps/electron-linux
          else
            cd apps/electron
          fi
          npx electron-builder

      - name: Upload desktop installer (macOS/Windows)
        if: runner.os != 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-installer-${{ matrix.os }}
          path: |
            apps/electron/out/*.dmg
            apps/electron/out/*.zip
            apps/electron/out/*.exe
          retention-days: 90

      - name: Upload desktop installer (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-installer-${{ matrix.os }}
          path: |
            apps/electron-linux/out/*.AppImage
            apps/electron-linux/out/*.deb
            apps/electron-linux/out/*.tar.gz
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: [build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/desktop-installer-ubuntu-latest/*
            artifacts/desktop-installer-macos-latest/*
            artifacts/desktop-installer-windows-latest/*
