name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-ta-agent:
    name: Build ta_agent (PyInstaller)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build
        run: |
          cd F:/ta_agent   # 待 ta_agent 迁入 TAgent 后改为 packages/ta-agent/
          pyinstaller TAgent.spec --clean --noconfirm

      - name: Upload ta_agent binary
        uses: actions/upload-artifact@v4
        with:
          name: ta-agent-binary
          path: F:/ta_agent/release/ta-agent-*
          retention-days: 30

  build-desktop:
    name: Build Desktop (electron-builder)
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build desktop
        run: |
          cd apps/electron
          bun run build

      - name: Package (electron-builder)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd apps/electron
          bun run dist

      - name: Upload desktop installer
        uses: actions/upload-artifact@v4
        with:
          name: desktop-installer-${{ matrix.os }}
          path: apps/electron/release/electron/latest/*.{exe,dmg,deb,AppImage}
          retention-days: 90

  build-server:
    name: Build Server (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd apps/server
          docker build -t tagent-server:${{ github.ref_name }} .
          docker save tagent-server:${{ github.ref_name }} > tagent-server.tar

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: tagent-server-image
          path: apps/server/tagent-server.tar
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: [build-ta-agent, build-desktop, build-server]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate Release Notes
        id: release_notes
        run: |
          # 从 CHANGELOG.md 提取当前版本段
          VERSION=${GITHUB_REF_NAME#v}
          awk "/^## \\[$VERSION\\]/{flag=1; next} /^## \\[/{flag=0} flag" CHANGELOG.md > release_notes.md
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$(cat release_notes.md)" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          files: |
            artifacts/ta-agent-binary/*
            artifacts/desktop-installer-ubuntu-latest/*
            artifacts/desktop-installer-macos-latest/*
            artifacts/desktop-installer-windows-latest/*
            artifacts/tagent-server-image/*
