name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            workdir: apps/electron
            artifact: desktop-macos
            paths: |
              apps/electron/out/*.dmg
              apps/electron/out/*.zip
          - os: windows-latest
            platform: win
            workdir: apps/electron
            artifact: desktop-windows
            paths: |
              apps/electron/out/*.exe
          - os: ubuntu-latest
            platform: linux
            workdir: apps/electron-linux
            artifact: desktop-linux
            paths: |
              apps/electron-linux/out/*.AppImage
              apps/electron-linux/out/*.deb
              apps/electron-linux/out/*.tar.gz
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 删除国内 npm 镜像，CI 国际网络用官方源
      - name: Use official npm registry
        run: |
          rm -f .npmrc
          # 临时禁用 lockfile 中的镜像地址（保留 bun.lock 结构，重写 npm 解析域名）
          if [ -f bun.lock ]; then
            sed -i 's|https://registry\.npmmirror\.com|https://registry.npmjs.org|g' bun.lock
            sed -i 's|https://npmmirror\.com/mirrors/electron/|https://github.com/electron/electron/releases/download/|g' bun.lock
          fi
          # 让 bun install 在 Linux 上同时拉 linux-x64 / linux-arm64 native 二进制
          echo "Configured to use official registry"

      - name: Install dependencies
        run: |
          bun install --no-frozen-lockfile

      # Linux runner 额外需要：创建符号链接到主工程
      - name: Setup Linux symlinks
        if: runner.os == 'Linux'
        working-directory: apps/electron-linux
        run: |
          chmod +x setup-symlinks.sh
          ./setup-symlinks.sh

      - name: Build
        working-directory: ${{ matrix.workdir }}
        run: bun run build

      - name: Package (electron-builder)
        working-directory: ${{ matrix.workdir }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Linux 跳过签名（开源项目无需签名）
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --${{ matrix.platform }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: [build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -laR artifacts/ || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/**
