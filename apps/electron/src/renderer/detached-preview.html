<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TAgent Preview</title>
    <script>
      // 主题初始化脚本（在 React 加载前执行，避免闪烁）
      ;(function() {
        var mode = localStorage.getItem('tagent-theme-mode') || 'dark'
        var style = localStorage.getItem('tagent-theme-style')
        var html = document.documentElement

        if (mode === 'special' && style && style !== 'default') {
          html.classList.add('theme-' + style)
          if (style.endsWith('-dark')) {
            html.classList.add('dark')
          }
        } else if (mode === 'dark') {
          html.classList.add('dark')
        } else if (mode === 'system') {
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            html.classList.add('dark')
          }
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
