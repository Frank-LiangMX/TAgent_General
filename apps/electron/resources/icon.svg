<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!--
    TAgent 应用图标
    设计：icosahedron（二十面体）几何造型 + 角标勾
    画布: 1024x1024
    圆角矩形背景: macOS Big Sur+ 规范（22.5% 圆角）
  -->

  <defs>
    <!-- 角标勾背景渐变（绿色） -->
    <linearGradient id="checkBadge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BC9A6"/>
      <stop offset="100%" stop-color="#5BA888"/>
    </linearGradient>
  </defs>

  <!-- 圆角矩形背景 -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="#2A2A2A"/>

  <!-- 二十面体几何造型（居中） -->
  <g transform="translate(512 512)" stroke="#FFFFFF" stroke-width="6" stroke-linejoin="round">

    <!-- 主体多边形：icosahedron 正面投影（5 个主顶点呈五边形） -->
    <polygon points="0,-260 250,-80 155,225 -155,225 -250,-80"
             fill="#E8E5DF" />

    <!-- 内部细分线 - 从中心向各顶点 -->
    <line x1="0" y1="0" x2="0" y2="-260" stroke="#FFFFFF" stroke-width="5"/>
    <line x1="0" y1="0" x2="250" y2="-80" stroke="#FFFFFF" stroke-width="5"/>
    <line x1="0" y1="0" x2="155" y2="225" stroke="#FFFFFF" stroke-width="5"/>
    <line x1="0" y1="0" x2="-155" y2="225" stroke="#FFFFFF" stroke-width="5"/>
    <line x1="0" y1="0" x2="-250" y2="-80" stroke="#FFFFFF" stroke-width="5"/>

    <!-- 内部细分点 - 制造 3D 二十面体感 -->
    <!-- 上半部分的中点 -->
    <line x1="0" y1="-130" x2="125" y2="-40" stroke="#FFFFFF" stroke-width="4"/>
    <line x1="0" y1="-130" x2="-125" y2="-40" stroke="#FFFFFF" stroke-width="4"/>
    <line x1="0" y1="-130" x2="0" y2="0" stroke="#FFFFFF" stroke-width="4"/>

    <!-- 中部细分点 -->
    <line x1="-78" y1="73" x2="78" y2="73" stroke="#FFFFFF" stroke-width="4"/>
    <line x1="-125" y1="-40" x2="-78" y2="73" stroke="#FFFFFF" stroke-width="4"/>
    <line x1="125" y1="-40" x2="78" y2="73" stroke="#FFFFFF" stroke-width="4"/>

    <!-- 突出 facet（右上）青色高亮 -->
    <polygon points="0,-260 250,-80 125,-40 0,-130"
             fill="#7AB8B2" stroke="#FFFFFF" stroke-width="5" stroke-linejoin="round"/>

    <!-- 底部 facet 略深（增强立体感） -->
    <polygon points="-155,225 -78,73 78,73 155,225"
             fill="#D8D5CF" stroke="#FFFFFF" stroke-width="4" stroke-linejoin="round"/>

    <!-- 左上 facet 略亮 -->
    <polygon points="0,-260 -125,-40 -250,-80"
             fill="#F0EDE7" stroke="#FFFFFF" stroke-width="4" stroke-linejoin="round"/>

  </g>

  <!-- 角标：右下角绿色勾（Verified badge） -->
  <g transform="translate(770 770)">
    <!-- 圆形背景 -->
    <circle r="115" fill="url(#checkBadge)" stroke="#FFFFFF" stroke-width="8"/>
    <!-- 勾 -->
    <polyline points="-50,5 -15,40 50,-30"
              fill="none" stroke="#FFFFFF"
              stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
